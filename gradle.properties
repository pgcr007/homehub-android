# Project-wide Gradle settings.

# JVM args for the Gradle daemon
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use AndroidX instead of the deprecated Support Library.
# Required — this project's dependencies (Compose, Navigation, Firebase) are AndroidX-only.
android.useAndroidX=true

# Automatically convert third-party libraries still using the old Support Library.
android.enableJetifier=false

# Use Kotlin's official code style.
kotlin.code.style=official

# Enable Gradle's parallel and caching features.
org.gradle.parallel=true
org.gradle.caching=true